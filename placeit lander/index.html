<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 100dvh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      cursor: pointer;
      transition: background-image 0.5s ease-in-out;
    }

    /* Optional overlay (for better visibility if you add text later) */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }

    /* Mobile optimization */
    @media (max-width: 768px) {
      .hero {
        background-position: center;
      }
    }
  </style>
</head>

<body>

  <section class="hero" id="hero">
    <div class="overlay"></div>
  </section>

  <script>
    // 🔹 Add your images here
    const images = [
      "assets/image-1.png",
      "assets/image-2.png",
      "assets/image-3.png",
      "assets/image-4.png"
    ];

    const hero = document.getElementById("hero");

    // 🔹 Preload images (faster UX)
    images.forEach(src => {
      const img = new Image();
      img.src = src;
    });

    // 🔹 Random image on refresh
    const randomImage = images[Math.floor(Math.random() * images.length)];
    hero.style.backgroundImage = `url('${randomImage}')`;

    // 🔹 FULL PAGE CLICK REDIRECT (CPA friendly)
    hero.addEventListener("click", () => {
      window.location.href = "#"; // 🔥 replace this
    });

    // 🔹 Optional: cursor hint for mobile
    hero.addEventListener("touchstart", () => {
      hero.style.opacity = "0.95";
    });
  </script>

</body>
</html>
